<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Hallowed Gains LLC</title>
    <meta name="description" content="Get in touch with Hallowed Gains LLC — questions, feedback, or business inquiries.">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="HG.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            50: '#F7F3E3',   // ivory
                            100: '#EDE4CC',  // warm ivory (borders / subtle bg)
                            200: '#DED2B2',  // warm ivory hover
                            500: '#8A7866',  // warm muted brown (secondary text)
                            800: '#65342F',  // burgundy red (accent / hover)
                            900: '#322E2C',  // dark brown/black (headings / dark bg)
                        },
                        gold: {
                            DEFAULT: '#AF9164',
                            soft: '#EFE3CB',
                            deep: '#7A6340',
                        },
                        silver: {
                            DEFAULT: '#B4B6B7',
                            soft: '#E6E7E8',
                            deep: '#6E7172',
                        },
                        burgundy: {
                            soft: '#F0DCD9',
                            deep: '#4A2421',
                        },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-50 text-brand-900 font-sans antialiased flex flex-col min-h-screen">

    <!-- Gold accent stripe -->
    <div class="h-1 bg-gold w-full"></div>

    <!-- Header -->
    <header class="bg-brand-900 shadow-lg sticky top-0 z-10 border-b border-gold/40">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 text-brand-50 font-serif font-semibold text-xl tracking-tight hover:opacity-80 transition-opacity">
                <img src="HG.png" alt="Hallowed Gains Logo" class="w-8 h-8 object-contain">
                Hallowed Gains LLC
            </a>
            <!-- Desktop Nav -->
            <nav class="hidden sm:block">
                <ul class="flex gap-6 text-sm font-medium text-brand-50/70">
                    <li><a href="/#about" class="hover:text-gold transition-colors">About</a></li>
                    <li><a href="/#projects" class="hover:text-gold transition-colors">Our Projects</a></li>
                    <li><a href="/contact.html" class="text-gold font-semibold">Contact</a></li>
                </ul>
            </nav>
            <!-- Mobile Hamburger -->
            <button id="menu-btn" class="sm:hidden flex flex-col gap-1.5 p-1" aria-label="Toggle navigation" aria-expanded="false">
                <span id="bar1" class="block w-6 h-0.5 bg-brand-50 transition-all duration-300 origin-center"></span>
                <span id="bar2" class="block w-6 h-0.5 bg-brand-50 transition-all duration-300"></span>
                <span id="bar3" class="block w-6 h-0.5 bg-brand-50 transition-all duration-300 origin-center"></span>
            </button>
        </div>
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="sm:hidden hidden border-t border-gold/30 bg-brand-900 px-6 py-4">
            <ul class="flex flex-col gap-1 text-sm font-medium text-brand-50/80">
                <li><a href="/#about" onclick="closeMenu()" class="hover:text-gold transition-colors block py-2">About</a></li>
                <li><a href="/#projects" onclick="closeMenu()" class="hover:text-gold transition-colors block py-2">Our Projects</a></li>
                <li><a href="/contact.html" onclick="closeMenu()" class="text-gold font-semibold block py-2">Contact</a></li>
            </ul>
        </div>
    </header>

    <main class="flex-grow">
        <section class="max-w-2xl mx-auto px-6 py-20">

            <div class="text-center mb-10">
                <h1 class="font-serif text-4xl font-bold text-brand-900 mb-4">Get in Touch</h1>
                <p class="text-brand-500 text-lg leading-relaxed">Questions, feedback, or business inquiries — we'd love to hear from you.</p>
            </div>

            <div class="bg-white rounded-2xl border border-brand-100 shadow-sm overflow-hidden">
                <iframe
                    src="https://docs.google.com/forms/d/e/1FAIpQLSfJ9ydz5vudJAcuXeuj1M8tgAH7kxnRALVGwtO0y9o1f_z35g/viewform?embedded=true"
                    width="100%"
                    height="700"
                    frameborder="0"
                    marginheight="0"
                    marginwidth="0"
                    title="Contact Form"
                >
                    Loading…
                </iframe>
            </div>

        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-brand-900 text-brand-50/70 py-10 text-center text-sm border-t-2 border-gold">
        <div class="max-w-5xl mx-auto px-6 flex flex-col items-center justify-center">
            <p>&copy; <script>document.write(new Date().getFullYear())</script> Hallowed Gains LLC. All rights reserved.</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const bar1 = document.getElementById('bar1');
        const bar2 = document.getElementById('bar2');
        const bar3 = document.getElementById('bar3');
        let menuOpen = false;

        function closeMenu() {
            menuOpen = false;
            mobileMenu.classList.add('hidden');
            menuBtn.setAttribute('aria-expanded', 'false');
            bar1.style.transform = '';
            bar2.style.opacity = '1';
            bar3.style.transform = '';
        }

        menuBtn.addEventListener('click', () => {
            menuOpen = !menuOpen;
            if (menuOpen) {
                mobileMenu.classList.remove('hidden');
                menuBtn.setAttribute('aria-expanded', 'true');
                bar1.style.transform = 'translateY(8px) rotate(45deg)';
                bar2.style.opacity = '0';
                bar3.style.transform = 'translateY(-8px) rotate(-45deg)';
            } else {
                closeMenu();
            }
        });
    </script>
</body>
</html>
